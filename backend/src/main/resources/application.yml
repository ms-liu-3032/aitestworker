server:
  port: 8080

spring:
  application:
    name: aitest-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aitest?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  secret-key: ${APP_SECRET_KEY:}
  model-secret-key: ${APP_MODEL_SECRET_KEY:}
  jwt:
    secret: ${JWT_SECRET:}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  file:
    storage-root: ${FILE_STORAGE_ROOT:./data/files}
  upload:
    root: ${UPLOAD_ROOT:./data/uploads}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

aitest:
  llm:
    connect-timeout-seconds: ${AITEST_LLM_CONNECT_TIMEOUT_SECONDS:20}
    request-timeout-seconds: ${AITEST_LLM_REQUEST_TIMEOUT_SECONDS:120}
    max-concurrent: ${AITEST_LLM_MAX_CONCURRENT:2}
    max-retries: ${AITEST_LLM_MAX_RETRIES:1}
    retry-backoff-millis: ${AITEST_LLM_RETRY_BACKOFF_MILLIS:1500}
    json-response-format-enabled: ${AITEST_LLM_JSON_RESPONSE_FORMAT_ENABLED:true}
    # DeepSeek V4 defaults to a reasoning channel. Structured pipeline JSON defaults to non-thinking.
    deepseek-thinking-mode: ${AITEST_LLM_DEEPSEEK_THINKING_MODE:disabled}
  generation:
    async-threads: ${AITEST_GENERATION_ASYNC_THREADS:2}
    # No-progress timeout. Every completed generation node refreshes the task heartbeat.
    task-timeout-seconds: ${AITEST_GENERATION_TASK_TIMEOUT_SECONDS:1800}
    # Separate safety circuit breaker; do not use it to limit normal comprehensive generation.
    task-max-runtime-seconds: ${AITEST_GENERATION_TASK_MAX_RUNTIME_SECONDS:14400}
