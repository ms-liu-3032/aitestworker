server:
  port: 8080

spring:
  application:
    name: aitest-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aitest?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  secret-key: ${APP_SECRET_KEY:jhMJjbxDD1cYO+4P4JJks4XQEj6vZl96DpizxxmZHIk=}
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  file:
    storage-root: ${FILE_STORAGE_ROOT:./data/files}
  upload:
    root: ${UPLOAD_ROOT:./data/uploads}

aitest:
  llm:
    connect-timeout-seconds: ${AITEST_LLM_CONNECT_TIMEOUT_SECONDS:20}
    request-timeout-seconds: ${AITEST_LLM_REQUEST_TIMEOUT_SECONDS:240}
