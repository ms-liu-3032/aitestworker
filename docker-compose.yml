services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env before starting Docker Compose}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aitest}
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 25s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro

  redis:
    image: redis:7.4
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - /etc/localtime:/etc/localtime:ro

  weaviate:
    image: semitechnologies/weaviate:1.26.6
    ports:
      - "8081:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
      TZ: Asia/Shanghai
    volumes:
      - weaviate_data:/var/lib/weaviate
      - /etc/localtime:/etc/localtime:ro

  neo4j:
    image: neo4j:5.24
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:?Set NEO4J_AUTH in .env before starting Docker Compose}
      TZ: Asia/Shanghai
    volumes:
      - neo4j_data:/data
      - /etc/localtime:/etc/localtime:ro

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env before starting Docker Compose}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env before starting Docker Compose}
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - /etc/localtime:/etc/localtime:ro

volumes:
  mysql_data:
  weaviate_data:
  neo4j_data:
  minio_data:
